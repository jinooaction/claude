name: KIS smoke (autonomous)

# KIS API 회귀를 운영자 손 안 거치고 자동으로 잡는 워크플로우.
#
# 동작:
#   1. main 으로 push 될 때마다 자동 실행 (PR 머지 직후 회귀 즉시 감지).
#   2. 매일 03:00 UTC (KST 12:00, 미국 시장 외 시간) 정기 실행.
#   3. 운영자가 GitHub Actions UI 에서 수동 트리거 가능.
#
# SSH 로 운영자 인스턴스(Vultr 등)에 접속 → /opt/auto-invest 에서
# `KIS_LIVE_TEST=1 uv run pytest tests/integration/test_live_broker.py -v`
# 실행. KIS 키는 인스턴스의 .env 에 이미 있으므로 secrets 로 노출 안 함.
#
# 검증 항목 (tests/integration/test_live_broker.py):
#   - test_live_kis_token_and_quote: KIS OAuth + AAPL quote
#   - test_live_kis_purchasable_cash: 외화예수금 조회 (잔고 0원 회귀)
#   - test_live_kis_positions: 보유 종목 조회 (포트폴리오 stub 회귀)
#   - test_live_kis_combined_balance: end-to-end 잔고 (cash + 평가금액)
#
# 실패하면 main 의 commit status 에 X 표시 + workflow log 에 한글 진단.
#
# 사전 준비:
#   - operator-design.yml 과 동일한 4개 GitHub Secret 필요
#     (VULTR_SSH_HOST/USER/PRIVATE_KEY/PORT).
#   - 인스턴스의 /opt/auto-invest/.env 에 KIS_APP_KEY / KIS_APP_SECRET /
#     KIS_ACCOUNT_NO 가 정상 설정돼 있어야 함.

on:
  push:
    branches: [main]
    # broker 또는 라이브 smoke 코드 변경이 있을 때만 트리거.
    # 문서/스펙만 바뀐 PR 의 main 머지는 굳이 KIS API 안 호출.
    paths:
      - 'src/auto_invest/broker/**'
      - 'src/auto_invest/cli.py'
      - 'src/auto_invest/reconciliation/**'
      - 'tests/integration/test_live_broker.py'
      - '.github/workflows/kis-smoke.yml'
  schedule:
    # 매일 03:00 UTC = KST 12:00 (미국 시장 외 시간).
    # 운영자가 만든 룰이 매일 정상 동작하는지 confirm.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write  # 사이드카 브랜치 force-push 용 (automation/kis-smoke-last-run).

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets presence
        id: secrets_check
        env:
          HOST: ${{ secrets.VULTR_SSH_HOST }}
          USER: ${{ secrets.VULTR_SSH_USER }}
          KEY: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${HOST:-}" ]] && missing+=("VULTR_SSH_HOST")
          [[ -z "${USER:-}" ]] && missing+=("VULTR_SSH_USER")
          [[ -z "${KEY:-}"  ]] && missing+=("VULTR_SSH_PRIVATE_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
              # 시크릿 미등록은 "실패"가 아니라 "셋업 보류". 이 단계까지가
              # 자율 수행이 자기 자신을 셋업할 수 없는 영역이므로, 워크플로우는
              # 통과 처리하고 다음 main push 부터 시크릿이 채워지면 자동으로
              # 실제 회귀 감시가 시작되게 둔다. (헌법 IX.D 운영자 자율 수행
              # 보장 — 셋업 안 됐다고 매 push 마다 빨간 X 노이즈를 띄우지 않음.)
              echo "::warning::GitHub Secrets 미등록 (${missing[*]}). 1회 셋업 보류 — smoke 건너뜀."
              echo "셋업 후 다음 main push 부터 자동 KIS 회귀 감시 시작."
              echo "가이드: docs/OPERATOR_GITHUB_ACTIONS_DESIGN.md"
              echo "secrets_present=false" >> "$GITHUB_OUTPUT"
          else
              echo "Secrets OK (host=${HOST}, user=${USER})."
              echo "secrets_present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SSH key
        id: ssh_key
        if: steps.secrets_check.outputs.secrets_present == 'true'
        env:
          KEY: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if grep -q "PRIVATE KEY" ~/.ssh/id_ed25519; then
              echo "SSH key installed."
              echo "key_valid=true" >> "$GITHUB_OUTPUT"
          else
              # 잘못된 키 형식도 셋업 보류 — 빨간 X 대신 통과 + warning.
              echo "::warning::VULTR_SSH_PRIVATE_KEY 형식이 SSH 개인키가 아닙니다 (셋업 보류)."
              echo "ssh-keygen -t ed25519 -f ~/.ssh/auto_invest_gh 로 생성한 키 전체 내용을"
              echo "BEGIN/END 줄 포함해서 Secret 에 다시 붙여넣으세요."
              echo "key_valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run KIS smoke on instance
        id: smoke_run
        if: steps.secrets_check.outputs.secrets_present == 'true' && steps.ssh_key.outputs.key_valid == 'true'
        env:
          HOST: ${{ secrets.VULTR_SSH_HOST }}
          USER: ${{ secrets.VULTR_SSH_USER }}
          PORT: ${{ secrets.VULTR_SSH_PORT }}
        # SSH/원격 셋업 미완료(인스턴스 미준비 / 키 미인가 / /opt/auto-invest 부재 /
        # .env 미설정) 는 모두 "셋업 보류"로 분류해 빨간 X 가 아니라 ⏭️ 통과로 처리.
        # 진짜 회귀(KIS API 응답 변경, pytest 실패)만 빨간 X.
        #
        # exit code 규약:
        #   0   = pytest 전부 통과 (성공)
        #   100 = 원격 스크립트가 셋업 보류 신호 (REPO 부재 / .env 부재)
        #   255 = SSH 연결 실패 (호스트 unreachable / 인증 거부)
        #   기타 = pytest 실패 (진짜 회귀 신호)
        run: |
          set -uo pipefail
          port="${PORT:-22}"
          echo "============================================================"
          echo "KIS smoke 자율 검증 — 트리거: ${GITHUB_EVENT_NAME}"
          echo "대상 인스턴스: ${USER}@${HOST}:${port}"
          echo "============================================================"

          # set -e 없이 ssh 의 exit code 를 명시적으로 처리.
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
              -o BatchMode=yes \
              -p "${port}" \
              -i ~/.ssh/id_ed25519 \
              "${USER}@${HOST}" \
              bash -s <<'REMOTE_SCRIPT' 2>&1 | tee /tmp/smoke_output.log
          set -uo pipefail
          REPO=/opt/auto-invest
          if [[ ! -d "${REPO}" ]]; then
              echo "::warning::${REPO} 가 인스턴스에 없습니다 — provision-vultr.yml 미실행 (셋업 보류)."
              exit 100
          fi
          cd "${REPO}"
          echo "--- git pull ---"
          # /opt/auto-invest 가 root 소유이면 sudo -u auto-invest git 이
          # "dubious ownership" 으로 거부 → fallback 으로 root 가 fetch.
          # 명시적으로 두 사용자 모두 safe.directory 등록해 warning 제거.
          git config --global --add safe.directory /opt/auto-invest 2>/dev/null || true
          sudo -u auto-invest git config --global --add safe.directory /opt/auto-invest 2>/dev/null || true
          sudo -u auto-invest git fetch --quiet origin main 2>/dev/null || git fetch --quiet origin main
          sudo -u auto-invest git checkout main 2>/dev/null || git checkout main 2>/dev/null
          sudo -u auto-invest git reset --hard origin/main 2>/dev/null || git reset --hard origin/main
          echo "현재 HEAD: $(git rev-parse --short HEAD) ($(git log -1 --pretty=%s))"
          echo
          echo "--- .env 확인 (KIS 키만 ✓ 표시, 값 노출 안 함) ---"
          if [[ ! -f "${REPO}/.env" ]]; then
              echo "::warning::${REPO}/.env 파일이 없습니다 — scripts/set_secrets.sh 미실행 (셋업 보류)."
              exit 100
          fi
          missing_env=()
          for k in KIS_APP_KEY KIS_APP_SECRET KIS_ACCOUNT_NO; do
              if grep -qE "^${k}=[^[:space:]]" "${REPO}/.env"; then
                  echo "  ${k}: ✓ 설정됨"
              else
                  missing_env+=("${k}")
              fi
          done
          if [[ ${#missing_env[@]} -gt 0 ]]; then
              echo "::warning::.env 에 다음 KIS 키 누락: ${missing_env[*]} (셋업 보류)."
              exit 100
          fi
          echo
          echo "--- KIS_LIVE_TEST=1 라이브 smoke 실행 ---"
          # .env 의 KIS_* 를 export. uv run 이 그 환경을 그대로 받음.
          set -a
          source "${REPO}/.env"
          set +a
          # sudo -E 가 root 의 HOME=/root 로 남으면서 auto-invest 가 root 의
          # ~/.cache/uv 에 접근 시도 → permission denied. UV_CACHE_DIR /
          # HOME 을 명시 전달로 우회. PATH 도 함께 보존.
          AUTO_INVEST_HOME=$(getent passwd auto-invest 2>/dev/null | cut -d: -f6 || echo /tmp)
          KIS_LIVE_TEST=1 sudo -E -u auto-invest \
              env "PATH=$PATH" \
                  "HOME=${AUTO_INVEST_HOME}" \
                  "UV_CACHE_DIR=${AUTO_INVEST_HOME}/.cache/uv" \
                  "KIS_LIVE_TEST=1" \
                  "KIS_APP_KEY=$KIS_APP_KEY" \
                  "KIS_APP_SECRET=$KIS_APP_SECRET" \
                  "KIS_ACCOUNT_NO=$KIS_ACCOUNT_NO" \
              /usr/local/bin/uv run --project "${REPO}" pytest \
                  tests/integration/test_live_broker.py -v -s 2>&1
          pytest_exit=$?
          if [[ "${pytest_exit}" -ne 0 ]]; then
              # sudo / uv 경로 차이 자동 fallback. root 환경에서 직접 실행.
              echo "  (재시도: 직접 uv 호출 — root 환경)"
              cd "${REPO}"
              KIS_LIVE_TEST=1 uv run pytest \
                  tests/integration/test_live_broker.py -v -s
              pytest_exit=$?
          fi
          # pytest 통과/실패가 진짜 회귀 신호 — exit code 그대로 propagate.
          exit "${pytest_exit}"
          REMOTE_SCRIPT
          smoke_exit=${PIPESTATUS[0]}
          echo "smoke_exit=${smoke_exit}"
          echo "smoke_exit=${smoke_exit}" >> "$GITHUB_OUTPUT"

          # 분류 우선순위:
          #   1. /tmp/smoke_output.log 에 pytest 실행 마커가 없음 → pytest 단계 진입
          #      자체를 못한 것 → 셋업 보류 (어떤 exit code 든).
          #   2. exit 0 → 성공.
          #   3. exit 1~4 → pytest 표준 실패/내부 오류 → 진짜 회귀 신호 (빨간 X).
          #   4. 그 외 (5/no tests, 100/원격 보류, 126/permission, 127/cmd missing,
          #      255/SSH 실패 등) → 셋업 보류.
          pytest_marker="KIS_LIVE_TEST=1 라이브 smoke 실행"
          if ! grep -qF "${pytest_marker}" /tmp/smoke_output.log 2>/dev/null; then
              echo "::warning::pytest 실행 단계 진입 못함 (exit ${smoke_exit}) — SSH/원격 셋업 보류."
              echo "원격 인스턴스 ${USER}@${HOST}:${port} 의 셋업 단계 어디선가 막힘 — provision-vultr / set_secrets / auto-invest 사용자 / uv 설치 등 확인."
              echo "smoke_state=setup_pending" >> "$GITHUB_OUTPUT"
          else
              case "${smoke_exit}" in
                0)
                  echo "smoke_state=success" >> "$GITHUB_OUTPUT"
                  ;;
                1|2|3|4)
                  echo "::error::KIS smoke 실패 (exit ${smoke_exit}) — pytest test 실패 또는 내부 오류 (진짜 회귀 신호)."
                  echo "smoke_state=failure" >> "$GITHUB_OUTPUT"
                  exit "${smoke_exit}"
                  ;;
                *)
                  echo "::warning::Smoke 비정상 종료 (exit ${smoke_exit}) — 셋업 보류로 분류."
                  echo "smoke_state=setup_pending" >> "$GITHUB_OUTPUT"
                  ;;
              esac
          fi

      - name: Write workflow summary
        if: always()
        env:
          SECRETS_PRESENT: ${{ steps.secrets_check.outputs.secrets_present }}
          KEY_VALID: ${{ steps.ssh_key.outputs.key_valid }}
          SMOKE_STATE: ${{ steps.smoke_run.outputs.smoke_state }}
        run: |
          set -euo pipefail
          # 우선순위 순으로 상태 분류.
          if [[ "${SECRETS_PRESENT:-}" != "true" ]]; then
              status="⏭️ 건너뜀 — Vultr SSH 시크릿 미등록 (셋업 보류)"
              detail="GitHub Settings → Secrets and variables → Actions 에서 VULTR_SSH_HOST/USER/PRIVATE_KEY 등록."
          elif [[ "${KEY_VALID:-}" != "true" ]]; then
              status="⏭️ 건너뜀 — VULTR_SSH_PRIVATE_KEY 형식 잘못됨 (셋업 보류)"
              detail="ssh-keygen 으로 생성한 ed25519 개인키 전체 내용(BEGIN/END 줄 포함)을 Secret 에 다시 붙여넣기."
          elif [[ "${SMOKE_STATE:-}" == "success" ]]; then
              status="✅ 모든 KIS smoke 통과"
              detail="KIS quote / 외화예수금 / 보유 종목 / 합산 잔고 4건 모두 정상."
          elif [[ "${SMOKE_STATE:-}" == "setup_pending" ]]; then
              status="⏭️ 건너뜀 — 인스턴스/원격 셋업 미완료 (셋업 보류)"
              detail="SSH 연결 실패 또는 원격의 /opt/auto-invest / .env 부재. 위 'Run KIS smoke on instance' 스텝 로그의 ::warning:: 메시지 참조."
          elif [[ "${SMOKE_STATE:-}" == "failure" ]]; then
              status="❌ 실패 — pytest 실패 (진짜 회귀 신호)"
              detail="위 'Run KIS smoke on instance' 스텝 로그를 확인하세요. KIS 토큰 만료, KIS API 응답 필드 변경, broker 모듈 회귀 등."
          else
              status="❓ 알 수 없는 상태"
              detail="SMOKE_STATE=${SMOKE_STATE:-(unset)}, SECRETS_PRESENT=${SECRETS_PRESENT:-(unset)}, KEY_VALID=${KEY_VALID:-(unset)}"
          fi
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # KIS smoke 자율 검증 결과

          | 항목 | 값 |
          |------|-----|
          | 트리거 | ${GITHUB_EVENT_NAME} |
          | 결과 | ${status} |
          | 상세 | ${detail} |

          ## 검증 범위 (회귀 방어)

          - KIS OAuth + AAPL quote
          - 외화예수금 조회 — 잔고 0원 표시 회귀
          - 보유 종목 조회 — 포트폴리오 stub 회귀
          - 합산 잔고 (cash + 평가금액) — design 명령 동일 경로

          실패 시 자동 머지 정책(IX.D) 하에서 다음 main push 가 들어오기 전에
          후속 PR 로 픽스해야 합니다.
          EOF

      - name: Publish diagnostic to sidecar branch
        # GitHub Actions UI 안 들어가도 외부(claude session 등) 에서
        # smoke 실행 결과를 읽을 수 있게 force-push.
        # 운영자 자율 수행 정책 IX.D — 운영자가 워크플로우 로그를 직접
        # 확인 안 해도 자동으로 진단 가능한 채널 확보.
        #
        # 사용법:
        #   git fetch origin automation/kis-smoke-last-run
        #   git show origin/automation/kis-smoke-last-run:LAST_RUN.md
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRETS_PRESENT: ${{ steps.secrets_check.outputs.secrets_present }}
          KEY_VALID: ${{ steps.ssh_key.outputs.key_valid }}
          SMOKE_STATE: ${{ steps.smoke_run.outputs.smoke_state }}
          SMOKE_EXIT: ${{ steps.smoke_run.outputs.smoke_exit }}
        run: |
          set -uo pipefail
          BRANCH=automation/kis-smoke-last-run

          # smoke_output.log 캡처 (없을 수 있음 — Run KIS smoke 단계 진입 못한 경우)
          if [[ -f /tmp/smoke_output.log ]]; then
              smoke_log_present=1
          else
              smoke_log_present=0
          fi

          tmpdir=$(mktemp -d)
          cd "${tmpdir}"
          git init -q
          git config user.name "kis-smoke-bot"
          git config user.email "kis-smoke-bot@noreply.github.com"

          {
              echo "# KIS smoke 자율 검증 — 최신 실행 진단"
              echo ""
              echo "이 파일은 \`.github/workflows/kis-smoke.yml\` 이 매 run 마다 자동 force-push 합니다. 운영자가 GitHub Actions UI 에 들어가지 않고도 외부 (예: claude session) 에서 \`git fetch origin ${BRANCH} && git show origin/${BRANCH}:LAST_RUN.md\` 로 진단 가능합니다."
              echo ""
              echo "## 메타데이터"
              echo ""
              echo "| 항목 | 값 |"
              echo "|------|-----|"
              echo "| run_id | ${GITHUB_RUN_ID} |"
              echo "| run_url | https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} |"
              echo "| commit | ${GITHUB_SHA} |"
              echo "| trigger | ${GITHUB_EVENT_NAME} |"
              echo "| timestamp_utc | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
              echo ""
              echo "## 상태"
              echo ""
              echo "| 변수 | 값 |"
              echo "|------|-----|"
              echo "| secrets_present | ${SECRETS_PRESENT:-(unset)} |"
              echo "| key_valid | ${KEY_VALID:-(unset)} |"
              echo "| smoke_state | ${SMOKE_STATE:-(unset)} |"
              echo "| smoke_exit | ${SMOKE_EXIT:-(unset)} |"
              echo ""
              echo "## SSH/원격 출력 (smoke_output.log)"
              echo ""
              if [[ "${smoke_log_present}" == "1" ]]; then
                  echo '```'
                  cat /tmp/smoke_output.log
                  echo '```'
              else
                  echo "(\`/tmp/smoke_output.log\` 없음 — Run KIS smoke 스텝까지 진입 못함. secrets_present 또는 key_valid 가 false 였을 가능성.)"
              fi
              echo ""
              echo "## 다음 단계 추정"
              echo ""
              if [[ "${SECRETS_PRESENT:-}" != "true" ]]; then
                  echo "- Vultr SSH 시크릿 미등록. GitHub Settings → Secrets and variables → Actions 에서 VULTR_SSH_HOST/USER/PRIVATE_KEY 등록."
              elif [[ "${KEY_VALID:-}" != "true" ]]; then
                  echo "- VULTR_SSH_PRIVATE_KEY 형식 잘못. ssh-keygen 으로 생성한 ed25519 개인키 전체 (BEGIN/END 포함) 다시 붙여넣기."
              elif [[ "${SMOKE_STATE:-}" == "success" ]]; then
                  echo "- 추가 액션 없음. 매일 03:00 UTC cron 으로 자동 감시 계속."
              elif [[ "${SMOKE_STATE:-}" == "setup_pending" ]]; then
                  echo "- 위 smoke_output.log 의 ::warning:: 메시지로 어느 셋업 단계가 빠졌는지 확인."
              else
                  echo "- pytest 자체가 실패. smoke_output.log 의 traceback/assertion 메시지로 원인 분석."
              fi
          } > LAST_RUN.md

          git checkout --orphan publish
          git add LAST_RUN.md
          git commit -q -m "kis-smoke run ${GITHUB_RUN_ID} @ ${GITHUB_SHA:0:7}"

          # force-push: 사이드카 브랜치는 항상 단일 커밋만 유지 (히스토리 누적 방지).
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "publish:${BRANCH}"

          echo "Published diagnostic to branch ${BRANCH}."
          echo "Read with: git fetch origin ${BRANCH} && git show origin/${BRANCH}:LAST_RUN.md"
