name: Go live (canary) — guarded AUTO_INVEST_MODE=live

# 헌법 X.4 (v4.0.0)가 정의한 "가드형 go-live 채널". 운영자 지시로 시스템을
# dry-run → 라이브 캐너리로 전환한다. 새 배포 로직을 만들지 않는다 — 서버의
# deploy/go-live-canary.sh 를 SSH 로 파이프해 .env 의 AUTO_INVEST_MODE 한 줄만
# live 로 바꾸고 워커를 재시작하며, 헬스체크 실패 시 dry-run 으로 자동 복구한다.
#
# 안전 경계 (스크립트가 서버에서 강제):
#   - 라이브 캐너리까지만 — 룰셋(캐너리)·자본(소액)·K1 캡은 그대로. 모드만 바뀐다.
#   - 장중에는 전환 보류 (헌법 VIII.A): XNYS 정규장이면 deferred 로 끝낸다.
#   - 실패 시 dry-run 자동 복구.
#   - 풀라이브 승격이 아니다 — 그건 별도 운영자 결정(헌법 VI 3단계).
#
# 두 가지 방식으로 트리거:
#   1) 운영자 원클릭: Actions → 이 워크플로우 → Run workflow → confirm 에
#      "GO-LIVE-CANARY" 입력. (SSH·시크릿 직접 다룰 필요 없음)
#   2) 자율(운영자 지시 기록): automation/go-live-canary.request 센티넬 파일이
#      main 에 머지되면 push 로 트리거. 머지 자체가 운영자 지시의 포렌식 기록이다.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '실거래(라이브 캐너리)로 전환하려면 정확히 "GO-LIVE-CANARY" 입력'
        required: true
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - 'automation/go-live-canary.request'

permissions:
  contents: write  # 사이드카 브랜치 force-push 용 (automation/go-live-last-run).

concurrency:
  # 라이브 전환은 한 번에 하나만.
  group: go-live-canary
  cancel-in-progress: false

jobs:
  go-live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (to pipe deploy/go-live-canary.sh over SSH)
        uses: actions/checkout@v4

      - name: Validate confirmation (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          if [[ "${CONFIRM}" != "GO-LIVE-CANARY" ]]; then
            echo "::error::confirm 입력이 'GO-LIVE-CANARY' 가 아닙니다. 전환 중단."
            exit 1
          fi
          echo "확인어 일치 — 라이브 캐너리 전환 진행."

      - name: Install SSH key
        env:
          KEY: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Arm live canary via guarded server script
        id: golive
        env:
          HOST: ${{ secrets.VULTR_SSH_HOST }}
          USER: ${{ secrets.VULTR_SSH_USER }}
          PORT: ${{ secrets.VULTR_SSH_PORT }}
        run: |
          set +e
          port="${PORT:-22}"
          ssh -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              -p "${port}" \
              -i ~/.ssh/id_ed25519 \
              "${USER}@${HOST}" \
              'sudo bash -s' < deploy/go-live-canary.sh \
              > /tmp/golive.txt 2>&1
          ssh_exit=$?
          cat /tmp/golive.txt
          result="$(grep -oE 'GO_LIVE_RESULT=[a-z_]+' /tmp/golive.txt | tail -1 | cut -d= -f2)"
          echo "ssh_exit=${ssh_exit}" >> "$GITHUB_OUTPUT"
          echo "result=${result:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Summarise
        if: always()
        env:
          SSH_EXIT: ${{ steps.golive.outputs.ssh_exit }}
          RESULT: ${{ steps.golive.outputs.result }}
        run: |
          log="$(cat /tmp/golive.txt 2>/dev/null || echo '(no output captured)')"
          case "${RESULT}" in
            armed_live_canary)
              status="✅ 라이브 캐너리 무장 완료 — AUTO_INVEST_MODE=live (캐너리 룰셋·소액·K1 캡 그대로). 첫 실주문 기회는 다음 미국 정규장."
              effective_exit=0 ;;
            deferred_market_open)
              status="⏸ 장중 보류 (헌법 VIII.A) — .env 무변경. 장 마감 후 재실행하면 전환됩니다."
              effective_exit=0 ;;
            reverted_dry_run)
              status="❌ 헬스체크 실패 — dry-run 으로 자동 복구됨. 워커는 안전 상태(실주문 없음). 로그 확인 필요."
              effective_exit=1 ;;
            *)
              status="⚠ 결과 불명 (ssh_exit=${SSH_EXIT}) — 아래 로그 확인. 서버 상태 수동 점검 권장."
              effective_exit=1 ;;
          esac
          {
            echo "## Go live (canary) — 결과"
            echo ""
            echo "- 상태: ${status}"
            echo "- GO_LIVE_RESULT: \`${RESULT}\`"
            echo "- ssh exit: \`${SSH_EXIT}\`"
            echo "- commit: \`${GITHUB_SHA}\`"
            echo ""
            echo "<details><summary>go-live-canary.sh 서버 출력</summary>"
            echo ""
            echo '```'
            echo "${log}"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${effective_exit}"

      - name: Publish result to sidecar branch
        # GitHub Actions UI 안 들어가도 외부(claude session 등)에서 전환 결과를
        # 읽을 수 있게 force-push (kis-smoke 패턴 재사용).
        #   git fetch origin automation/go-live-last-run
        #   git show origin/automation/go-live-last-run:LAST_RUN.md
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULT: ${{ steps.golive.outputs.result }}
          SSH_EXIT: ${{ steps.golive.outputs.ssh_exit }}
        run: |
          set -uo pipefail
          BRANCH=automation/go-live-last-run
          tmpdir=$(mktemp -d)
          cd "${tmpdir}"
          git init -q
          git config user.name "go-live-bot"
          git config user.email "go-live-bot@noreply.github.com"
          {
            echo "# 라이브 캐너리 전환 — 최신 실행 결과"
            echo ""
            echo "이 파일은 \`go-live-canary.yml\` 이 매 run 마다 force-push 합니다."
            echo "외부에서 \`git fetch origin ${BRANCH} && git show origin/${BRANCH}:LAST_RUN.md\` 로 확인."
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| run_id | ${GITHUB_RUN_ID} |"
            echo "| run_url | https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} |"
            echo "| commit | ${GITHUB_SHA} |"
            echo "| trigger | ${GITHUB_EVENT_NAME} |"
            echo "| timestamp_utc | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| GO_LIVE_RESULT | ${RESULT:-(unset)} |"
            echo "| ssh_exit | ${SSH_EXIT:-(unset)} |"
            echo ""
            echo "## 의미"
            echo ""
            case "${RESULT:-}" in
              armed_live_canary) echo "✅ **라이브 캐너리 무장됨** — AUTO_INVEST_MODE=live (캐너리 룰셋·소액·K1 캡). 첫 실주문 기회는 다음 미국 정규장." ;;
              deferred_market_open) echo "⏸ **장중 보류** (헌법 VIII.A) — .env 무변경. 장 마감 후 재실행 시 전환." ;;
              reverted_dry_run) echo "❌ **헬스체크 실패 → dry-run 자동 복구** — 워커 안전(실주문 없음). 서버 로그 확인 필요." ;;
              *) echo "⚠ **결과 불명** (ssh_exit=${SSH_EXIT:-?}) — 서버/워크플로우 로그 수동 점검." ;;
            esac
            echo ""
            echo "## 서버 출력 (go-live-canary.sh)"
            echo ""
            echo '```'
            cat /tmp/golive.txt 2>/dev/null || echo "(출력 없음 — SSH 단계 진입 못함)"
            echo '```'
          } > LAST_RUN.md
          git checkout --orphan publish
          git add LAST_RUN.md
          git commit -q -m "go-live run ${GITHUB_RUN_ID} @ ${GITHUB_SHA:0:7} (${RESULT:-unknown})"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "publish:${BRANCH}"
          echo "Published to ${BRANCH}."
