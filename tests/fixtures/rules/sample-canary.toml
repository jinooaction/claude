# Sample canary rules fixture used by tests and quickstart.
# Mirrors the schema declared in
# specs/001-automated-trading-mvp/contracts/rules-config.md.

[caps]
per_trade_pct                  = 5.0
per_symbol_pct                 = 20.0
global_exposure_pct            = 80.0
canary_capital_pct             = 5.0
canary_min_duration_days       = 10
canary_acceptance_drawdown_pct = 3.0

[whitelist]
symbols     = ["AAPL", "MSFT", "SPY"]
accounts    = ["${KIS_ACCOUNT_NO}"]
order_types = ["LIMIT"]
sessions    = ["REGULAR"]

[[rules]]
id       = "spy-morning-dip"
symbol   = "SPY"
stage    = "CANARY"
priority = 10
enabled  = true

  [rules.trigger]
  kind             = "price"
  direction        = "<="
  threshold        = 540.00
  cooldown_seconds = 600

  [rules.action]
  side        = "BUY"
  order_type  = "LIMIT"
  qty         = 5
  limit_price = "trigger - 0.10"

[[rules]]
id       = "msft-ema-cross"
symbol   = "MSFT"
stage    = "CANARY"
priority = 20
enabled  = true

  [rules.trigger]
  kind             = "indicator"
  indicator        = "EMA_CROSS"
  timeframe        = "1d"
  cooldown_seconds = 86400

    [rules.trigger.params]
    fast_period = 20
    slow_period = 50
    direction   = "fast_above_slow"

  [rules.action]
  side        = "BUY"
  order_type  = "LIMIT"
  qty         = 3
  limit_price = "last_close * 1.001"
